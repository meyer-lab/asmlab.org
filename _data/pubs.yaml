- abstract: The concentration of biomarkers, such as DNA, prior to a
    subsequent detection step may facilitate the early detection of
    cancer, which could significantly increase chances for survival. In
    this study, the partitioning behavior of mammalian genomic DNA
    fragments in a two-phase aqueous micellar system was investigated
    using both experiment and theory. The micellar system was generated
    using the nonionic surfactant Triton X-114 and phosphate-buffered
    saline (PBS). Partition coefficients were measured under a variety
    of conditions and compared with our theoretical predictions. With
    this comparison, we demonstrated that the partitioning behavior of
    DNA fragments in this system is primarily driven by repulsive,
    steric, excluded-volume interactions that operate between the
    micelles and the DNA fragments, but is limited by the entrainment of
    micelle-poor, DNA-rich domains in the macroscopic micelle-rich
    phase. Furthermore, the volume ratio, that is, the volume of the
    top, micelle-poor phase divided by that of the bottom, micelle-rich
    phase, was manipulated to concentrate DNA fragments in the top
    phase. Specifically, by decreasing the volume ratio from 1 to 1/10,
    we demonstrated proof-of-principle that the concentration of DNA
    fragments in the top phase could be increased two- to nine-fold in a
    predictive manner.
