- abstract: The relationship between drug resistance, changes in
    signaling, and emergence of an invasive phenotype is well
    appreciated, but the underlying mechanisms are not well understood.
    Using machine learning analysis applied to the Cancer Cell Line
    Encyclopedia database, we identified expression of AXL, the gene
    that encodes the epithelial-to-mesenchymal transition
    (EMT)-associated receptor tyrosine kinase (RTK) AXL, as
    exceptionally predictive of lack of response to ErbB family
    receptor-targeted inhibitors. Activation of EGFR (epidermal growth
    factor receptor) transactivated AXL, and this ligand-independent AXL
    activity diversified EGFR-induced signaling into additional
    downstream pathways beyond those triggered by EGFR alone.
    AXL-mediated signaling diversification was required for EGF
    (epidermal growth factor)-elicited motility responses in
    AXL-positive TNBC (triple-negative breast cancer) cells. Using
    cross-linking coimmunoprecipitation assays, we determined that AXL
    associated with EGFR, other ErbB receptor family members, MET
    (hepatocyte growth factor receptor), and PDGFR (platelet-derived
    growth factor receptor) but not IGF1R (insulin-like growth factor 1
    receptor) or INSR (insulin receptor). From these AXL interaction
    data, we predicted AXL-mediated signaling synergy for additional
    RTKs and validated these predictions in cells. This alternative
    mechanism of receptor activation limits the use of ligand-blocking
    therapies and indicates against therapy withdrawal after acquired
    resistance. Further, subadditive interaction between EGFR- and
    AXL-targeted inhibitors across all AXL-positive TNBC cell lines may
    indicate that increased abundance of EGFR is principally a means to
    transactivation-mediated signaling.
