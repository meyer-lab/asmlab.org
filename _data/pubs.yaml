- abstract: Conjugating certain types of lentiviral vectors with
    targeting ligands can redirect the vectors to specifically transduce
    desired cell types. However, extensive genetic and/or biochemical
    manipulations are required for conjugation, which hinders
    applications for targeting lentiviral vectors for broader research
    fields. We developed envelope proteins fused with biotin-binding
    molecules to conjugate the pseudotyped vectors with biotinylated
    targeting molecules by simply mixing them. The envelope proteins
    fused with the monomeric, but not tetrameric, biotin-binding
    molecules can pseudotype lentiviral vectors and be conjugated with
    biotinylated targeting ligands. The conjugation is stable enough to
    redirect lentiviral transduction in the presence of serum,
    indicating their potential in in vivo . When a signaling molecule is
    conjugated with the vector, the conjugation facilitates transduction
    and signaling in a receptor-specific manner. This simple method of
    ligand conjugation and ease of obtaining various types of
    biotinylated ligands will make targeted lentiviral transduction
    easily applicable to broad fields of research.
