- abstract: Cell signaling is orchestrated in part through a network of
    protein kinases and phosphatases. Dysregulation of kinase signaling
    is widespread in diseases such as cancer and is readily targetable
    through inhibitors. Mass spectrometry-based analysis can provide a
    global view of kinase regulation but mining these data is
    complicated by its stochastic coverage of the proteome, measurement
    of substrates rather than kinases, and the scale of the data. Here,
    we implement a Dual Data and Motif Clustering (DDMC) strategy that
    simultaneously clusters peptides into similarly regulated groups
    based on their variation and their sequence profile. We show that
    this can help to identify putative upstream kinases and supply more
    robust clustering. We apply this clustering to clinical proteomic
    profiling of lung cancer and identify conserved proteomic signatures
    of tumorigenicity, genetic mutations, and immune infiltration. We
    propose that DDMC provides a general and flexible clustering
    strategy for the analysis of phosphoproteomic data.
