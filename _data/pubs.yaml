- abstract: Kinase inhibitor resistance often involves upregulation of
    poorly understood "bypass" signaling pathways. Here, we show that
    extracellular proteomic adaptation is one path to bypass signaling
    and drug resistance. Proteolytic shedding of surface receptors,
    which can provide negative feedback on signaling activity, is
    blocked by kinase inhibitor treatment and enhances bypass signaling.
    In particular, MEK inhibition broadly decreases shedding of multiple
    receptor tyrosine kinases (RTK), including HER4, MET, and most
    prominently AXL, an ADAM10 and ADAM17 substrate, thus increasing
    surface RTK levels and mitogenic signaling. Progression-free
    survival of patients with melanoma treated with clinical BRAF/MEK
    inhibitors inversely correlates with RTK shedding reduction
    following treatment, as measured noninvasively in blood plasma.
    Disrupting protease inhibition by neutralizing TIMP1 improves MAPK
    inhibitor efficacy, and combined MAPK/AXL inhibition synergistically
    reduces tumor growth and metastasis in xenograft models. Altogether,
    extracellular proteomic rewiring through reduced RTK shedding
    represents a surprising mechanism for bypass signaling in cancer
    drug resistance.
