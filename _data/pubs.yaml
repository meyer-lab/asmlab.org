- abstract: Recent biological studies have been revolutionized in scale
    and granularity by multiplex and high-throughput assays. Profiling
    cell responses across several experimental parameters, such as
    perturbations, time, and genetic contexts, leads to richer and more
    generalizable findings. However, these multidimensional datasets
    necessitate a reevaluation of the conventional methods for their
    representation and analysis. Traditionally, experimental parameters
    are merged to flatten the data into a two-dimensional matrix,
    sacrificing crucial experiment context reflected by the structure.
    As Marshall McLuhan famously stated, "the medium is the message." In
    this work, we propose that the experiment structure is the medium in
    which subsequent analysis is performed, and the optimal choice of
    data representation must reflect the experiment structure. We review
    how tensor-structured analyses and decompositions can preserve this
    information. We contend that tensor methods are poised to become
    integral to the biomedical data sciences toolkit.
