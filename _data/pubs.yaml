- abstract: Many immune receptors transduce activation across the plasma
    membrane through their clustering. With Fcγ receptors (FcγRs), this
    clustering is driven by binding to antibodies of differing
    affinities that are in turn bound to multivalent antigen. As a
    consequence of this activation mechanism, accounting for and
    rationally manipulating immunoglobulin (Ig)G effector function is
    complicated by, among other factors, differing affinities between
    FcγR species and changes in the valency of antigen binding. In this
    study, we show that a model of multivalent receptor-ligand binding
    can effectively account for the contribution of IgG-FcγR affinity
    and immune complex valency. This model in turn enables us to make
    specific predictions about the effect of immune complexes of defined
    composition. In total, these results enable both rational immune
    complex design for a desired IgG effector function and the
    deconvolution of effector function by immune complexes.
