- abstract: Methicillin-resistant Staphylococcus aureus (MRSA)
    bacteremia is a common and life-threatening infection that imposes
    up to 30 used. Despite in vitro efficacy determined by minimum
    inhibitory concentration (MIC) breakpoints, antibiotics often fail
    to resolve these infections in vivo, resulting in persistent MRSA
    bacteremia. Recently, several genetic, epigenetic, and proteomic
    correlates of persistent outcomes have been identified. However, the
    extent to which single variables or their composite patterns operate
    as independent predictors of outcome or reflect shared underlying
    mechanisms of persistence is unknown. To explore this question, we
    employed a tensor-based integration of host transcriptional and
    cytokine datasets across a well-characterized cohort of patients
    with persistent or resolving MRSA bacteremia outcomes. This method
    yielded high correlative accuracy with outcomes and immunologic
    signatures united by transcriptomic and cytokine datasets. Results
    reveal that patients with persistent MRSA bacteremia exhibit signals
    of granulocyte dysfunction, suppressed antigen presentation, and
    deviated lymphocyte polarization. In contrast, patients with
    resolving bacteremia heterogeneously exhibit correlates of robust
    antigen-presenting cell trafficking and enhanced neutrophil
    maturation corresponding to appropriate T lymphocyte polarization
    and B lymphocyte response. These results suggest that
    transcriptional and cytokine correlates of persistent versus
    resolving bacteremia outcomes are complex and may not be disclosed
    by conventional modeling. In this respect, a tensor-based
    integration approach may help to reveal consensus molecular and
    cellular mechanisms and their biological interpretation.
