- abstract: The dogma that cancer is a genetic disease is being
    questioned. Recent findings suggest that genetic/nongenetic duality
    is necessary for cancer progression. A think tank organized by the
    Shraman Foundation's Institute for Theoretical Biology compiled key
    challenges and opportunities that theoreticians, experimentalists,
    and clinicians can explore from a systems biology perspective to
    provide a better understanding of the disease as well as help
    discover new treatment options and therapeutic strategies.
