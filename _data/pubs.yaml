- abstract: Ischemia-reperfusion injury (IRI) during orthotopic liver
    transplantation (OLT) contributes to graft rejection and poor
    clinical outcomes. The disulfide form of high mobility group box 1
    (diS-HMGB1), an intracellular protein released during OLT-IRI,
    induces pro-inflammatory macrophages. How diS-HMGB1 differentiates
    human monocytes into macrophages capable of activating adaptive
    immunity remains unknown. We investigated if diS-HMGB1 binds TLR4
    and TLR9 to differentiate monocytes into pro-inflammatory
    macrophages that activate adaptive immunity and promote graft injury
    and dysfunction. Assessment of 106 clinical liver tissue and
    longitudinal blood samples revealed that OLT recipients were more
    likely to experience IRI and graft dysfunction with increased
    diS-HMGB1 released during reperfusion. Increased diS-HMGB1
    concentration also correlated with TLR4/TLR9 activation,
    polarization of monocytes into pro-inflammatory macrophages, and
    production of anti-donor antibodies. In vitro, healthy volunteer
    monocytes stimulated with purified diS-HMGB1 had increased
    inflammatory cytokine secretion, antigen presentation machinery, and
    ROS production. TLR4 inhibition primarily impeded cytokine/chemokine
    and costimulatory molecule programs, whereas TLR9 inhibition
    decreased HLA-DR/ROS production. diS-HMGB1-polarized macrophages
    also showed increased capacity to present antigens and activate T
    memory cells. In murine OLT, diS-HMGB1 treatment potentiated
    IR-mediated hepatocellular injury, accompanied by increased serum
    alanine transaminase levels. This translational study identifies the
    diS-HMGB1/TLR4/TLR9 axis as potential therapeutic targets in OLT-IRI
    recipients.
