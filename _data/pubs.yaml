- abstract: "Metastases are a major cause of cancer mortality. AXL, a
    receptor tyrosine kinase (RTK) aberrantly expressed in many tumors,
    is a potent oncogenic driver of metastatic cell motility and has
    been identified as broadly relevant in cancer drug resistance.
    Despite its frequent association with changes in cancer phenotypes,
    the precise mechanism leading to AXL activation is incompletely
    understood. In addition to its ligand growth arrest specific-6
    (Gas6), activation of AXL requires the lipid moiety
    phosphatidylserine (PS). PS is only available to mediate AXL
    activation when it is externalized on cell membranes, an event that
    occurs during certain physiologic processes such as apoptosis. Here
    it is reported that exposure of cancer cells to PS-containing
    vesicles, including synthetic liposomes and apoptotic bodies,
    contributes to enhanced migration of tumor cells via a PS-Gas6-AXL
    signaling axis. These findings suggest that anti-cancer treatments
    that induce fractional cell killing enhance the motility of
    surviving cells in AXL-expressing tumors, which may explain the
    widespread role of AXL in limiting therapeutic efficacy.
    Implications: This study demonstrates that motility behavior of
    AXL-expressing tumor cells can be elicited by Gas6-bearing apoptotic
    bodies generated from tumor treatment with therapeutics that produce
    killing of a portion of the tumor cells present but not all, hence
    generating potentially problematic invasive and metastatic behavior
    of the surviving tumor cells."
