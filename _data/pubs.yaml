- abstract: Multivalent cell surface receptor binding is a ubiquitous
    biological phenomenon with functional and therapeutic significance.
    Predicting the amount of ligand binding for a cell remains an
    important question in computational biology as it can provide great
    insight into cell-to-cell communication and rational drug design
    toward specific targets. In this study, we extend a mechanistic,
    two-step multivalent binding model. This model predicts the behavior
    of a mixture of different multivalent ligand complexes binding to
    cells expressing various types of receptors. It accounts for the
    combinatorially large number of interactions between multiple
    ligands and receptors, optionally allowing a mixture of complexes
    with different valencies and complexes that contain heterogeneous
    ligand units. We derive the macroscopic predictions and demonstrate
    how this model enables large-scale predictions on mixture binding
    and the binding space of a ligand. This model thus provides an
    elegant and computationally efficient framework for analyzing
    multivalent binding.
