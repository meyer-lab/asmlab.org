- abstract: To better understand the signaling complexity of AXL, a
    member of the TAM receptor tyrosine kinase family, we created a
    physical and functional map of AXL signaling interactions,
    phosphorylation events, and target-engagement of three AXL tyrosine
    kinase inhibitors (TKI). We assessed AXL protein-complexes using
    BioID, effects of AXL TKI on global phosphoproteins using mass
    spectrometry, and target engagement of AXL TKI using activity-based
    protein profiling. BioID identifies AXL-interacting proteins that
    are mostly involved in cell adhesion/migration. Global
    phosphoproteomics show that AXL inhibition decreases phosphorylation
    of peptides involved in phosphatidylinositol-mediated signaling and
    cell adhesion/migration. Comparison of three AXL inhibitors reveals
    that TKI RXDX-106 inhibits pAXL, pAKT and migration/invasion of
    these cells without reducing their viability, while Bemcentinib
    exerts AXL-independent phenotypic effects on viability. Proteomic
    characterization of these TKIs demonstrates that they inhibit
    diverse targets in addition to AXL, with Bemcentinib having the most
    off-targets. AXL and EGFR TKI co-treatment did not reverse
    resistance in cell line models of Erlotinib-resistance. However, a
    unique vulnerability was identified in one resistant clone, wherein
    combination of Bemcentinib and Erlotinib inhibited cell viability
    and signaling. We also show that AXL is overexpressed in  30-40 AXL
    expression, with basal activation detected rarely.
