- abstract: Maternal Zika virus (ZIKV) infection during pregnancy is
    recognized as the cause of an epidemic of microcephaly and other
    neurological anomalies in human fetuses. It remains unclear how ZIKV
    accesses the highly vulnerable population of neural progenitors of
    the fetal central nervous system (CNS), and which cell types of the
    CNS may be viral reservoirs. In contrast, the related dengue virus
    (DENV) does not elicit teratogenicity. To model viral interaction
    with cells of the fetal CNS in vitro, we investigated the tropism of
    ZIKV and DENV for different induced pluripotent stem cell-derived
    human cells, with a particular focus on microglia-like cells. We
    show that ZIKV infected isogenic neural progenitors, astrocytes, and
    microglia-like cells (pMGLs), but was only cytotoxic to neural
    progenitors. Infected glial cells propagated ZIKV and maintained
    ZIKV load over time, leading to viral spread to susceptible cells.
    DENV triggered stronger immune responses and could be cleared by
    neural and glial cells more efficiently. pMGLs, when cocultured with
    neural spheroids, invaded the tissue and, when infected with ZIKV,
    initiated neural infection. Since microglia derive from primitive
    macrophages originating in proximity to the maternal vasculature,
    they may act as a viral reservoir for ZIKV and establish infection
    of the fetal brain. Infection of immature neural stem cells by
    invading microglia may occur in the early stages of pregnancy,
    before angiogenesis in the brain rudiments. Our data are also
    consistent with ZIKV and DENV affecting the integrity of the
    blood--brain barrier, thus allowing infection of the brain later in
    life.
