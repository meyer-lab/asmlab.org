- abstract: Targeted cancer therapeutics have demonstrated more limited
    clinical efficacy than anticipated, due to both intrinsic and
    acquired drug resistance. Underlying mechanisms have been largely
    attributed to genetic changes, but a substantial proportion of
    resistance observations remain unexplained by genomic properties.
    Emerging evidence shows that receptor tyrosine kinase (RTK)
    reprogramming is a major alternative process causing targeted drug
    resistance, separate from genetic alterations. Hence, the
    contributions of mechanisms leading to this process need to be more
    rigorously assessed.
