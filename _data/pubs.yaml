- abstract: Voltammetry is widely used to detect and quantify oxidizable
    or reducible species in complex environments. The neurotransmitter
    serotonin epitomizes an analyte that is challenging to detect in
    situ due to its low concentrations and the co-existence of similarly
    structured analytes and interferents. We developed rapid-pulse
    voltammetry for brain neurotransmitter monitoring due to the high
    information content elicited from voltage pulses. Generally, the
    design of voltammetry waveforms remains challenging due to
    prohibitively large combinatorial search spaces and a lack of design
    principles. Here, we illustrate how Bayesian optimization can be
    used to hone searches for optimized rapid pulse waveforms. Our
    machine-learning-guided workflow (SeroOpt) outperformed random and
    human-guided waveform designs and is tunable a priori to enable
    selective analyte detection. We interpreted the black box optimizer
    and found that the logic of machine-learning-guided waveform design
    reflected domain knowledge. Our approach is straightforward and
    generalizable for all single and multi-analyte problems requiring
    optimized electrochemical waveform solutions. Overall, SeroOpt
    enables data-driven exploration of the waveform design space and a
    new paradigm in electroanalytical method development.
