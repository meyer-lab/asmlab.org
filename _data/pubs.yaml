- abstract: Growth factor--induced migration is a critical step in the
    dissemination and metastasis of solid tumors. Although differences
    in properties characterizing cell migration on two-dimensional (2D)
    substrata versus within three-dimensional (3D) matrices have been
    noted for particular growth factor stimuli, the 2D approach remains
    in more common use as an efficient surrogate, especially for
    high-throughput experiments. We therefore were motivated to
    investigate which migration properties measured in various 2D assays
    might be reflective of 3D migratory behavioral responses. We used
    human triple-negative breast cancer lines stimulated by a panel of
    receptor tyrosine kinase ligands relevant to mammary carcinoma
    progression. Whereas 2D migration properties did not correlate well
    with 3D behavior across multiple growth factors, we found that
    increased membrane protrusion elicited by growth factor stimulation
    did relate robustly to enhanced 3D migration properties of the
    MDA-MB-231 and MDA-MB-157 lines. Interestingly, we observed this to
    be a more reliable relationship than cognate receptor expression or
    activation levels across these and two additional mammary tumor
    lines.
