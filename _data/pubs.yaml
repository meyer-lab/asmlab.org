- abstract: Cancer systems biology aims to understand cancer as an
    integrated system of genes, proteins, networks, and interactions
    rather than an entity of isolated molecular and cellular components.
    The inaugural Systems Approaches to Cancer Biology Conference,
    cosponsored by the Association of Early Career Cancer Systems
    Biologists and the National Cancer Institute of the NIH, focused on
    the interdisciplinary field of cancer systems biology and the
    challenging cancer questions that are best addressed through the
    combination of experimental and computational analyses. Attendees
    found that elucidating the many molecular features of cancer
    inevitably reveals new forms of complexity and concluded that
    ensuring the reproducibility and impact of cancer systems biology
    studies will require widespread method and data sharing and,
    ultimately, the translation of important findings to the clinic.
