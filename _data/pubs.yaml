- abstract: Cancer systems biology seeks to understand how cancer arises
    as a system of interconnected molecules, cells, and tissues, with
    the goal of understanding, predicting, and controlling the disease.
    In the last decade, the field has rapidly grown as advances in
    experimental, computational, and analytical technologies have
    improved our ability to capture and recapitulate the complexities of
    cancer at multiple scales. However, the field's promise to
    understand how specific molecular changes give rise to altered
    cancer outcomes remains incompletely fulfilled. Fortunately, an
    opportunity exists to accelerate progress by better coordinating
    modeling and data-gathering efforts across the cancer systems
    biology community. This will create the foundation for building
    accurate, multiscale cancer models that can better predict and
    identify improved therapeutic interventions. Here, we outline some
    of the current challenges in cancer systems biology research, how
    they can be addressed, and actions that the community can take to
    accelerate progress in the field.
