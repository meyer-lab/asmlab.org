- abstract: Receptor tyrosine kinase (RTK)-targeted therapies are often
    effective but invariably limited by drug resistance. A major
    mechanism of acquired resistance involves \"bypass\" switching to
    alternative pathways driven by non-targeted RTKs that restore
    proliferation. One such RTK is AXL whose overexpression, frequently
    observed in bypass resistant tumors, drives both cell survival and
    associated malignant phenotypes such as epithelial-to-mesenchymal
    (EMT) transition and migration. However, the signaling molecules and
    pathways eliciting these responses have remained elusive. To explore
    these coordinated effects, we generated a panel of mutant lung
    adenocarcinoma PC9 cell lines in which each AXL intracellular
    tyrosine residue was mutated to phenylalanine. By integrating
    measurements of phosphorylation signaling and other phenotypic
    changes associated with resistance through multivariate modeling, we
    mapped signaling perturbations to specific resistant phenotypes. Our
    results suggest that AXL signaling can be summarized into two
    clusters associated with progressive disease and poor clinical
    outcomes in lung cancer patients. These clusters displayed favorable
    Abl1 and SFK motifs and their phosphorylation was consistently
    decreased by dasatinib. High-throughput kinase specificity profiling
    showed that AXL likely activates the SFK cluster through FAK1 which
    is known to complex with Src. Moreover, the SFK cluster overlapped
    with a previously established focal adhesion kinase (FAK1) signature
    conferring EMT-mediated erlotinib resistance in lung cancer cells.
    Finally, we show that downstream of this kinase signaling, AXL and
    YAP form a positive feedback loop that sustains drug tolerant
    persister cells. Altogether, this work demonstrates an approach for
    dissecting signaling regulators by which AXL drives erlotinib
    resistance-associated phenotypic changes.
